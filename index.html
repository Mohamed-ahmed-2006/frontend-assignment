<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="page">
        <section class="card">
            <h1>Products</h1>

            <form id="product-form" class="product-form">
                <div class="form-group">
                    <label for="product-id">Product ID [auto created]</label>
                    <input type="text" id="product-id" name="id" hidden>
                </div>

                <div class="form-group">
                    <label for="product-name">Product Name</label>
                    <input type="text" id="product-name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="product-desc">Product Description</label>
                    <input type="text" id="product-desc" name="desc" required>
                </div>

                <div class="form-actions">
                    <button type="submit" id="submit-btn">Add Product</button>
                    <button type="button" id="cancel-btn" style="display:none;">Cancel</button>
                </div>
            </form>

            <p id="status" class="status"></p>
        </section>

        <section class="card">
            <h2>Products Table</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
